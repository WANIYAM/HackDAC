<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Secure checkout for your LUXE order. Fast delivery across Pakistan.">
<title>Checkout — LUXE</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231A1714'/><text y='.9em' font-size='75' x='12' fill='%23C9A96E' font-family='serif'>L</text></svg>">

<meta property="og:type" content="website">
<meta property="og:site_name" content="LUXE">
<meta property="og:url" content="checkout.html">
<meta property="og:title" content="Checkout — LUXE">
<meta property="og:description" content="Secure checkout for your LUXE order. Fast delivery across Pakistan.">
<meta property="og:image" content="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200&q=80">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg border-bottom">
  <div class="container-xl justify-content-center position-relative py-2">
    <a href="index.html" class="position-absolute start-0 text-dark" style="text-decoration: none; font-size: 14px;"><i class="bi bi-arrow-left"></i> Back to Store</a>
    <a class="navbar-brand m-0" href="index.html" style="font-size: 32px;">Luxe</a>
  </div>
</nav>

<!-- TOAST -->
<div id="toast" class="toast-msg" role="alert" aria-live="polite"></div>

<!-- CHECKOUT SECTION -->
<section class="checkout-section">
  <div class="container-xl" style="max-width: 1000px;">
    
    <div class="row g-5">
      <!-- Checkout Form -->
      <div class="col-lg-7">
        <form id="checkoutForm">
          <div class="checkout-card">
            <h3 class="checkout-title">Contact Information</h3>
            <div class="mb-3">
              <label for="email" class="form-label">Email Address *</label>
              <input type="email" class="form-control" id="email" required>
            </div>
          </div>

          <div class="checkout-card">
            <h3 class="checkout-title">Shipping Address</h3>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="firstName" class="form-label">First Name *</label>
                <input type="text" class="form-control" id="firstName" required>
              </div>
              <div class="col-md-6">
                <label for="lastName" class="form-label">Last Name *</label>
                <input type="text" class="form-control" id="lastName" required>
              </div>
              <div class="col-12">
                <label for="address" class="form-label">Address *</label>
                <input type="text" class="form-control" id="address" required>
              </div>
              <div class="col-md-4">
                <label for="city" class="form-label">City *</label>
                <input type="text" class="form-control" id="city" required>
              </div>
              <div class="col-md-4">
                <label for="state" class="form-label">State / Province</label>
                <input type="text" class="form-control" id="state">
              </div>
              <div class="col-md-4">
                <label for="zip" class="form-label">Postal Code *</label>
                <input type="text" class="form-control" id="zip" required>
              </div>
            </div>
          </div>

          <div class="checkout-card">
            <h3 class="checkout-title">Payment Method</h3>
            <div class="form-check mb-2">
              <input class="form-check-input" type="radio" name="paymentMethod" id="creditCard" value="card" checked>
              <label class="form-check-label" for="creditCard">Credit Card</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="paymentMethod" id="cod" value="cod">
              <label class="form-check-label" for="cod">Cash on Delivery</label>
            </div>
          </div>

          <button type="submit" class="btn btn-dark w-100 py-3 mb-4" style="font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Place Order</button>
        </form>
      </div>

      <!-- Order Summary -->
      <div class="col-lg-5">
        <div class="checkout-card" style="position: sticky; top: 20px;">
          <h3 class="checkout-title">Order Summary</h3>
          <div id="checkoutItemsList">
            <!-- Items rendered via JS -->
          </div>
          
          <div class="mt-4 pt-3 border-top">
            <a href="#" id="togglePromoBtn" style="font-size: 14px; color: var(--dark); text-decoration: underline;">Have a promo code?</a>
            <div id="promoContainer" style="display: none; margin-top: 12px;">
              <div class="d-flex gap-2">
                <input type="text" id="promoInput" class="form-control" placeholder="Enter promo code" style="border-radius: 0;">
                <button type="button" id="applyPromoBtn" class="btn-submit" style="padding: 10px 24px;">Apply</button>
              </div>
            </div>
          </div>
          
          <div class="mt-4">
            <div class="order-total-row">
              <span>Subtotal</span>
              <span id="checkoutSubtotal">Rs. 0</span>
            </div>
            <div class="order-total-row">
              <span>Shipping</span>
              <span>Free</span>
            </div>
            <div class="order-total-row final">
              <span>Total</span>
              <span id="checkoutTotal">Rs. 0</span>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- FOOTER (Simplified) -->
<footer class="footer py-4" style="border-top: 1px solid var(--border);">
  <div class="container-xl text-center">
    <p class="m-0 text-muted" style="font-size: 12px;">&copy; 2026 LUXE. Secure Checkout.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
