<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — LUXE</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
  .checkout-section {
    padding: 60px 0;
  }
  .checkout-card {
    background: #fff;
    border: 1px solid var(--border);
    padding: 30px;
    margin-bottom: 24px;
  }
  .checkout-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }
  .order-summary-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .order-summary-item img {
    width: 60px;
    height: 80px;
    object-fit: cover;
    margin-right: 16px;
  }
  .order-summary-info {
    flex-grow: 1;
  }
  .order-summary-info h6 {
    margin: 0 0 4px;
    font-size: 14px;
  }
  .order-summary-info p {
    margin: 0;
    color: var(--muted);
    font-size: 12px;
  }
  .order-total-row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-bottom: 8px;
  }
  .order-total-row.final {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 500;
    border-top: 1px solid var(--border);
    padding-top: 16px;
    margin-top: 16px;
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg border-bottom">
  <div class="container-xl justify-content-center position-relative py-2">
    <a href="index.html" class="position-absolute start-0 text-dark" style="text-decoration: none; font-size: 14px;"><i class="bi bi-arrow-left"></i> Back to Store</a>
    <a class="navbar-brand m-0" href="index.html" style="font-size: 32px;">Luxe</a>
  </div>
</nav>

<!-- TOAST -->
<div id="toast" class="toast-msg" role="alert" aria-live="polite"></div>

<!-- CHECKOUT SECTION -->
<section class="checkout-section">
  <div class="container-xl" style="max-width: 1000px;">
    
    <div class="row g-5">
      <!-- Checkout Form -->
      <div class="col-lg-7">
        <form id="checkoutForm">
          <div class="checkout-card">
            <h3 class="checkout-title">Contact Information</h3>
            <div class="mb-3">
              <label for="email" class="form-label">Email Address *</label>
              <input type="email" class="form-control" id="email" required>
            </div>
          </div>

          <div class="checkout-card">
            <h3 class="checkout-title">Shipping Address</h3>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="firstName" class="form-label">First Name *</label>
                <input type="text" class="form-control" id="firstName" required>
              </div>
              <div class="col-md-6">
                <label for="lastName" class="form-label">Last Name *</label>
                <input type="text" class="form-control" id="lastName" required>
              </div>
              <div class="col-12">
                <label for="address" class="form-label">Address *</label>
                <input type="text" class="form-control" id="address" required>
              </div>
              <div class="col-md-4">
                <label for="city" class="form-label">City *</label>
                <input type="text" class="form-control" id="city" required>
              </div>
              <div class="col-md-4">
                <label for="state" class="form-label">State / Province</label>
                <input type="text" class="form-control" id="state">
              </div>
              <div class="col-md-4">
                <label for="zip" class="form-label">Postal Code *</label>
                <input type="text" class="form-control" id="zip" required>
              </div>
            </div>
          </div>

          <div class="checkout-card">
            <h3 class="checkout-title">Payment Method</h3>
            <div class="form-check mb-2">
              <input class="form-check-input" type="radio" name="paymentMethod" id="creditCard" value="card" checked>
              <label class="form-check-label" for="creditCard">Credit Card</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="paymentMethod" id="cod" value="cod">
              <label class="form-check-label" for="cod">Cash on Delivery</label>
            </div>
          </div>

          <button type="submit" class="btn btn-dark w-100 py-3 mb-4" style="font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Place Order</button>
        </form>
      </div>

      <!-- Order Summary -->
      <div class="col-lg-5">
        <div class="checkout-card" style="position: sticky; top: 20px;">
          <h3 class="checkout-title">Order Summary</h3>
          <div id="checkoutItemsList">
            <!-- Items rendered via JS -->
          </div>
          
          <div class="mt-4">
            <div class="order-total-row">
              <span>Subtotal</span>
              <span id="checkoutSubtotal">Rs. 0</span>
            </div>
            <div class="order-total-row">
              <span>Shipping</span>
              <span>Free</span>
            </div>
            <div class="order-total-row final">
              <span>Total</span>
              <span id="checkoutTotal">Rs. 0</span>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- FOOTER (Simplified) -->
<footer class="footer py-4" style="border-top: 1px solid var(--border);">
  <div class="container-xl text-center">
    <p class="m-0 text-muted" style="font-size: 12px;">&copy; 2026 LUXE. Secure Checkout.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof renderCheckout === 'function') {
      renderCheckout();
    }
  });
</script>
</body>
</html>
