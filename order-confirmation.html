<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Your LUXE order has been placed successfully. Thank you for shopping with us.">
<title>Order Confirmation — LUXE</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231A1714'/><text y='.9em' font-size='75' x='12' fill='%23C9A96E' font-family='serif'>L</text></svg>">

<meta property="og:type" content="website">
<meta property="og:site_name" content="LUXE">
<meta property="og:url" content="order-confirmation.html">
<meta property="og:title" content="Order Confirmation — LUXE">
<meta property="og:description" content="Your LUXE order has been placed successfully. Thank you for shopping with us.">
<meta property="og:image" content="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200&q=80">
</head>
<body>

<div class="page-loader" id="pageLoader">
  <div class="loader-content">
    <div class="loader-brand">Luxe</div>
    <div class="loader-bar-wrap">
      <div class="loader-bar" id="loaderBar"></div>
    </div>
  </div>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg border-bottom">
  <div class="container-xl justify-content-center position-relative py-2">
    <a href="index.html" class="position-absolute start-0 text-dark navbar-back-link"><i class="bi bi-arrow-left"></i> Back to Store</a>
    <a class="navbar-brand m-0 navbar-brand-lg" href="index.html">Luxe</a>
  </div>
</nav>

<!-- ORDER CONFIRMATION SECTION -->
<section class="order-confirmation-section">
  <div class="container-xl">
    <div class="row">
      <div class="col-lg-6 mx-auto text-center">

        <!-- Success Icon -->
        <i class="bi bi-check-circle icon-xlg icon-gold icon-with-margin"></i>

        <!-- Thank You Message -->
        <h2 class="heading-xlg">Thank You For Your Order</h2>

        <p class="text-muted mb-4">Your order has been successfully placed. A confirmation email with order details and tracking information will be sent to your email address shortly.</p>

        <!-- Order Number Box -->
        <div class="order-number-box">
          <p class="text-muted mb-2 order-number-label">Order Number</p>
          <h3 id="orderNumber" class="order-number-value">#LX-000000</h3>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex gap-3 justify-content-center flex-wrap">
          <a href="index.html" class="btn-gold btn-min-width">Continue Shopping</a>
          <a href="collections.html" class="btn-outline-gold btn-min-width">View Collections</a>
        </div>

      </div>
    </div>
  </div>
</section>

<!-- MINIMAL FOOTER -->
<footer class="order-confirmation-footer">
  <div class="container-xl text-center">
    <p class="order-confirmation-footer-text">&copy; 2017&ndash;<span id="currentYear"></span> LUXE. All rights reserved.</p>
  </div>
</footer>

<button class="back-to-top" id="backToTop" aria-label="Back to top">
  <i class="bi bi-arrow-up" aria-hidden="true"></i>
</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
