<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmation — LUXE</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg border-bottom">
  <div class="container-xl justify-content-center position-relative py-2">
    <a href="index.html" class="position-absolute start-0 text-dark" style="text-decoration: none; font-size: 14px;"><i class="bi bi-arrow-left"></i> Back to Store</a>
    <a class="navbar-brand m-0" href="index.html" style="font-size: 32px;">Luxe</a>
  </div>
</nav>

<!-- ORDER CONFIRMATION SECTION -->
<section style="min-height: 60vh; padding: 80px 0; display: flex; align-items: center;">
  <div class="container-xl">
    <div class="row">
      <div class="col-lg-6 mx-auto text-center">

        <!-- Success Icon -->
        <i class="bi bi-check-circle" style="font-size: 64px; color: var(--gold); margin-bottom: 24px;"></i>

        <!-- Thank You Message -->
        <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 42px; margin-bottom: 16px;">Thank You For Your Order</h2>

        <p class="text-muted mb-4">Your order has been successfully placed. A confirmation email with order details and tracking information will be sent to your email address shortly.</p>

        <!-- Order Number Box -->
        <div style="background: #f8f8f8; border: 1px solid var(--border); padding: 24px; margin: 32px 0; border-radius: 4px;">
          <p class="text-muted mb-2" style="font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Order Number</p>
          <h3 id="orderNumber" style="font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 500; color: var(--gold); margin: 0;">#LX-000000</h3>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex gap-3 justify-content-center flex-wrap">
          <a href="index.html" class="btn-gold" style="min-width: 180px;">Continue Shopping</a>
          <a href="collections.html" class="btn-outline-gold" style="min-width: 180px;">View Collections</a>
        </div>

      </div>
    </div>
  </div>
</section>

<!-- MINIMAL FOOTER -->
<footer style="border-top: 1px solid var(--border); padding: 32px 0; background: #fff;">
  <div class="container-xl text-center">
    <p style="margin: 0; color: var(--muted); font-size: 14px;">&copy; 2017&ndash;<span id="currentYear"></span> LUXE. All rights reserved.</p>
  </div>
</footer>

<script>
  // Generate random order number
  function generateOrderNumber() {
    const randomNum = Math.floor(100000 + Math.random() * 900000);
    document.getElementById('orderNumber').textContent = '#LX-' + randomNum;
  }

  // Set current year
  document.getElementById('currentYear').textContent = new Date().getFullYear();

  // Generate order number on page load
  generateOrderNumber();
</script>

</body>
</html>
